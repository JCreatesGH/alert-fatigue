<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" font-family="system-ui,Segoe UI,Helvetica,sans-serif">
  <rect width="800" height="400" fill="#0d1117"/>
  <text x="28" y="40" font-size="19" font-weight="800" fill="#e6edf3">alert-fatigue</text>
  <text x="190" y="40" font-size="13" fill="#7d8590">turn a wall of pages into a tuning to-do list</text>
  <!-- stat cards -->
  <g>
    <rect x="28" y="58" width="175" height="70" rx="10" fill="#161b22" stroke="#30363d"/>
    <text x="44" y="82" font-size="12" fill="#7d8590">Self-resolve rate</text><text x="44" y="112" font-size="24" font-weight="800" fill="#f85149">61%</text>
    <rect x="214" y="58" width="175" height="70" rx="10" fill="#161b22" stroke="#30363d"/>
    <text x="230" y="82" font-size="12" fill="#7d8590">MTTA</text><text x="230" y="112" font-size="24" font-weight="800" fill="#e6edf3">8m 12s</text>
    <rect x="400" y="58" width="175" height="70" rx="10" fill="#161b22" stroke="#30363d"/>
    <text x="416" y="82" font-size="12" fill="#7d8590">Flapping rules</text><text x="416" y="112" font-size="24" font-weight="800" fill="#d29922">4</text>
    <rect x="586" y="58" width="186" height="70" rx="10" fill="#161b22" stroke="#30363d"/>
    <text x="602" y="82" font-size="12" fill="#7d8590">Total alerts</text><text x="602" y="112" font-size="24" font-weight="800" fill="#e6edf3">3,914</text>
  </g>
  <!-- noisiest bars -->
  <text x="28" y="160" font-size="13" fill="#9aa4b2" font-family="SFMono-Regular,monospace">noisiest rules</text>
  <g font-family="SFMono-Regular,monospace" font-size="12">
    <text x="28" y="186" fill="#c9d1d9">CPUHighWarning</text><rect x="200" y="176" width="360" height="13" rx="3" fill="#f85149"/><text x="570" y="186" fill="#9aa4b2">1,204</text>
    <text x="28" y="208" fill="#c9d1d9">DiskUsage85</text><rect x="200" y="198" width="240" height="13" rx="3" fill="#fb8500"/><text x="450" y="208" fill="#9aa4b2">812</text>
    <text x="28" y="230" fill="#c9d1d9">PodRestarted</text><rect x="200" y="220" width="150" height="13" rx="3" fill="#d29922"/><text x="360" y="230" fill="#9aa4b2">498</text>
  </g>
  <!-- recommendations -->
  <rect x="28" y="252" width="744" height="124" rx="8" fill="#11161f"/>
  <text x="44" y="276" font-size="12.5" fill="#9aa4b2" font-family="SFMono-Regular,monospace">recommendations:</text>
  <text font-size="12.5" font-family="SFMono-Regular,monospace" xml:space="preserve">
    <tspan x="44" y="300" fill="#3fb950">• Add a 'for' duration / hysteresis to 'CPUHighWarning' (fired 41× in an hour).</tspan>
    <tspan x="44" y="322" fill="#3fb950">• Demote or auto-close 'PodRestarted' — 460/498 self-resolved without ack.</tspan>
    <tspan x="44" y="344" fill="#3fb950">• Add a 'for' duration to 'DiskUsage85' (fired 12× in an hour).</tspan>
    <tspan x="44" y="366" fill="#7d8590">works with PagerDuty / Opsgenie / Alertmanager exports · ✓ 6 tests</tspan>
  </text>
</svg>
